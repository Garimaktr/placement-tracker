<!DOCTYPE html>
<html>
    <head>
        <title>Practice</title>
        <style>
            h1{
                text-align:center;
                font-weight:bolder;
                text-decoration:underline;
                line-height:2.5;
                letter-spacing:1px;
                text-transform:uppercase;
                font-family:Arial, Helvetica, sans-serif;
            }
            p{
                text-align:left;
                font-weight:200;
                line-height:normal;
                
            }
            button{
                background-color:#ffffff;
                border: 1px solid #ddd;
                border-radius:8px;
                padding:10px;
                width:100px;
                text-align:center;
                box-shadow: 0 4px 6px rgba(0,0,0,0.1);
                transition: transform 0.2s;
            }
            button:hover{
                transform: translateY(-2.5px);
            }
        </style>
    </head>
    <body>
        <h1>Practice makes a human perfect.</h1>
        <p>I am learning css.So i am writing this paragraph to practice it.</p>
        <button>Practice</button>
    </body>
</html>
